backend:
  name: git-gateway
  branch: main

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

publish_mode: editorial_workflow

collections:
  - name: "pages"
    label: "Pages"
    files:

      - name: "home"
        label: "Home"
        file: "content/home.json"
        format: "json"
        fields:
          - label: "Slider Images (max 5)"
            name: "slider"
            widget: "list"
            max: 5
            field:
              label: "Image"
              name: "image"
              widget: "image"

          - { label: "About Image", name: "aboutImage", widget: "image" }

          - label: "About Paragraphs"
            name: "aboutText"
            widget: "list"
            fields:
              - label: "English"
                name: "en"
                widget: "text"
              - label: "Spanish"
                name: "es"
                widget: "text"

      - name: "music"
        label: "Music"
        file: "content/music.json"
        format: "json"
        fields:
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Spanish", name: "es", widget: "string" }

          - label: "Description"
            name: "description"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Spanish", name: "es", widget: "text" }

          - label: "Music Cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Order", name: "order", widget: "number", value_type: "int", min: 1 }
              - { label: "Embed (Spotify/SoundCloud iframe)", name: "embed", widget: "text" }

              - label: "Title"
                name: "cardTitle"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Spanish", name: "es", widget: "string" }

              - label: "Description"
                name: "cardDescription"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Spanish", name: "es", widget: "string" }

      - name: "videos"
        label: "Videos"
        file: "content/videos.json"
        format: "json"
        fields:
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Spanish", name: "es", widget: "string" }

          - label: "Description"
            name: "description"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Spanish", name: "es", widget: "text" }

          - label: "Video Cards"
            name: "cards"
            widget: "list"
            fields:
              - { label: "Order", name: "order", widget: "number" }
              - { label: "Video URL (YouTube or Instagram)", name: "video", widget: "string" }

              - label: "Text"
                name: "text"
                widget: "object"
                fields:
                  - { label: "English", name: "en", widget: "string" }
                  - { label: "Spanish", name: "es", widget: "string" }

      - name: "photos"
        label: "Photos"
        file: "content/photos.json"
        format: "json"
        fields:
          - label: "Title"
            name: "title"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "string" }
              - { label: "Spanish", name: "es", widget: "string" }
          
          - label: "Description"
            name: "description"
            widget: "object"
            fields:
              - { label: "English", name: "en", widget: "text" }
              - { label: "Spanish", name: "es", widget: "text" }

          - label: "Photos"
            name: "photos"
            widget: "list"
            fields:

              - label: "Order"
                name: "order"
                widget: "number"
                value_type: "int"
                min: 1

              - label: "Photo"
                name: "image"
                widget: "image"
                media_folder: "assets/photos"
                public_folder: "/assets/photos"
