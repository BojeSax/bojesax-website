<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Böje — Live Saxophone DJ | Electronic Music Performer</title>

  <meta name="description"
  content="Böje is a live saxophone and DJ performer blending electronic music with live instrumental performance for clubs, events and festivals." />

  <meta name="robots" content="index, follow">

  <link rel="canonical" href="https://bojesax.com/contact">

  <meta name="author" content="Böje">

  <meta name="keywords"
  content="live sax DJ, saxophone DJ Barcelona, electronic sax performer, DJ sax events, live saxophone music">

  <meta property="og:title" content="Böje — Live Saxophone DJ" />

  <meta property="og:description"
  content="Live saxophone and electronic music performances for events, clubs and festivals." />

  <meta property="og:type" content="website">

  <meta property="og:url" content="https://bojesax.com">

  <meta property="og:image"
  content="https://bojesax.com/assets/images/boje-social.png">

  <!-- FAVICON -->
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">

  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-touch-icon.png">

  <link rel="manifest" href="/assets/favicon/site.webmanifest">

  <link rel="shortcut icon" href="/assets/favicon/favicon.ico">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Marcellus&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div id="navbar"></div>

  <main>
    <section class="contact-hero">
      <div class="contact-overlay"></div>

      <div class="wrapper contact-layout">
        <div class="contact-info reveal">
          <h1 data-i18n="contact_title">Book Böje</h1>

          <p data-i18n="contact_intro">
            For bookings, collaborations or live events, feel free to get in touch.
          </p>

          <div class="contact-direct">
            <p>
              <span data-i18n="contact_email_label">Email</span>
              <a href="mailto:realbojesound@gmail.com">realbojesound@gmail.com</a>
            </p>

            <p>
              <span data-i18n="contact_instagram_label">Instagram</span>
              <a href="https://www.instagram.com/bojesax" target="_blank" rel="noopener">@bojesax</a>
            </p>
          </div>
        </div>

        <form
          name="contact"
          method="POST"
          data-netlify="true"
          data-netlify-honeypot="bot-field"
          action="/?success=true"          class="contact-form reveal"
        >
          <input type="hidden" name="form-name" value="contact" />

          <p hidden>
            <label>
              Don’t fill this out: <input name="bot-field" />
            </label>
          </p>

          <label class="sr-only" for="contactName">Name</label>
          <input
            id="contactName"
            type="text"
            name="name"
            autocomplete="name"
            data-i18n-placeholder="contact_name"
            required
          />

          <label class="sr-only" for="contactEmail">Email</label>
          <input
            id="contactEmail"
            type="email"
            name="email"
            autocomplete="email"
            data-i18n-placeholder="contact_email"
            required
          />

          <label class="sr-only" for="contactMsg">Message</label>
          <textarea
            id="contactMsg"
            name="message"
            rows="6"
            data-i18n-placeholder="contact_message"
            required
          ></textarea>

          <button type="submit" class="btn-contact" data-i18n="contact_submit">
            Send Request
          </button>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/js/components.js"></script>
  <script src="/js/navigation.js"></script>
  <script src="/js/i18n.js"></script>

  <script src="js/cookies.js"></script>

  <script src="/js/reveal.js"></script>

  <form name="contact" data-netlify="true" hidden>
    <input type="text" name="name">
    <input type="email" name="email">
    <textarea name="message"></textarea>
  </form>
</body>
</html>
