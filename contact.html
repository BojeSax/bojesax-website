<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BOJE Live</title>
 
  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <div id="navbar"></div>

  <main>

    <section class="contact-hero">

        <div class="contact-overlay"></div>
      
        <div class="wrapper contact-layout">
      
          <div class="contact-info">
      
            <h1>Book Böje</h1>
      
            <p>
              For bookings, collaborations or live events, feel free to get in touch.
              Böje performs internationally combining live saxophone with electronic music.
            </p>
      
            <div class="contact-direct">
      
              <p>
                Email
                <a href="mailto:realbojesound@gmail.com">
                  realbojesound@gmail.com
                </a>
              </p>
      
              <p>
                Instagram
                <a href="https://www.instagram.com/bojesax" target="_blank">
                  @bojesax
                </a>
              </p>
      
            </div>
      
          </div>
      
          <form
            name="contact"
            method="POST"
            data-netlify="true"
            data-netlify-honeypot="bot-field"
            class="contact-form"
          >
      
            <input type="hidden" name="form-name" value="contact">
      
            <p hidden>
              <input name="bot-field">
            </p>
      
            <input type="text" name="name" placeholder="Name" required>
            <input type="email" name="email" placeholder="Email" required>
      
            <textarea name="message" placeholder="Describe your request" rows="6" required></textarea>
      
            <button type="submit" class="btn-contact">
              Send Request
            </button>
      
          </form>
      
        </div>
      
      </section>
  
  </main>

<div id="footer"></div>

<script src="js/components.js"></script>
<script src="js/navigation.js"></script>
<script src="js/i18n.js"></script>
<script src="js/videoRender.js"></script>
<script async src="https://www.instagram.com/embed.js"></script>

</body>
</html>
