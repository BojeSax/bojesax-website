<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Böje — Contact</title>
  <meta name="description" content="Book Böje for live saxophone performances, collaborations and events." />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Marcellus&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>
  <div id="navbar"></div>

  <main>
    <section class="contact-hero">
      <div class="contact-overlay"></div>

      <div class="wrapper contact-layout">
        <div class="contact-info reveal">
          <h1 data-i18n="contact_title">Book Böje</h1>

          <p data-i18n="contact_intro">
            For bookings, collaborations or live events, feel free to get in touch.
          </p>

          <div class="contact-direct">
            <p>
              <span data-i18n="contact_email_label">Email</span>
              <a href="mailto:realbojesound@gmail.com">realbojesound@gmail.com</a>
            </p>

            <p>
              <span data-i18n="contact_instagram_label">Instagram</span>
              <a href="https://www.instagram.com/bojesax" target="_blank" rel="noopener">@bojesax</a>
            </p>
          </div>
        </div>

        <form
          name="contact"
          method="POST"
          data-netlify="true"
          data-netlify-honeypot="bot-field"
          action="/?success=true"          class="contact-form reveal"
        >
          <input type="hidden" name="form-name" value="contact" />

          <p hidden>
            <label>
              Don’t fill this out: <input name="bot-field" />
            </label>
          </p>

          <label class="sr-only" for="contactName">Name</label>
          <input
            id="contactName"
            type="text"
            name="name"
            autocomplete="name"
            data-i18n-placeholder="contact_name"
            required
          />

          <label class="sr-only" for="contactEmail">Email</label>
          <input
            id="contactEmail"
            type="email"
            name="email"
            autocomplete="email"
            data-i18n-placeholder="contact_email"
            required
          />

          <label class="sr-only" for="contactMsg">Message</label>
          <textarea
            id="contactMsg"
            name="message"
            rows="6"
            data-i18n-placeholder="contact_message"
            required
          ></textarea>

          <button type="submit" class="btn-contact" data-i18n="contact_submit">
            Send Request
          </button>
        </form>
      </div>
    </section>
  </main>

  <div id="footer"></div>

  <script src="/js/components.js"></script>
  <script src="/js/navigation.js"></script>
  <script src="/js/i18n.js"></script>

  <script src="js/cookies.js"></script>

  <script src="/js/reveal.js"></script>

  <form name="contact" data-netlify="true" hidden>
    <input type="text" name="name">
    <input type="email" name="email">
    <textarea name="message"></textarea>
  </form>
</body>
</html>
