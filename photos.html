<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Böje — Photos</title>
  <meta name="description" content="Photos from Böje’s live performances, studio sessions and events." />

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Marcellus&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/css/style.css" />
</head>

<body>

  <div id="navbar"></div>

  <main class="section">
    <div class="wrapper">

      <header class="page-header reveal">
        <h1 id="photosTitle"></h1>
        <p id="photosDescription"></p>
      </header>

      <section class="photos-section reveal" aria-label="Böje photo gallery">
        <div id="photosGrid"></div>
      </section>

      <!-- FOLLOW INSTAGRAM -->
    <div class="photos-follow reveal">
        <a href="https://www.instagram.com/bojesax" 
        data-i18n="photos_follow"
        target="_blank">
          Follow Böje on Instagram →
        </a>
      </div>

    </div>
  </main>

  <div id="footer"></div>

  <script src="/js/components.js"></script>
  <script src="/js/navigation.js"></script>
  <script src="/js/i18n.js"></script>
  <script src="/js/photosRender.js"></script>
  <script src="/js/lightbox.js"></script>

  <script src="/js/cookies.js"></script>
  <script src="/js/reveal.js"></script>

</body>
</html>
